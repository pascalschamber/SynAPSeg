# belongs to postprocessing_kwargs
###################################
postprocessing_kwargs:
  axes:
    default_value: null
    widget_type: str
    tooltip: Axes to apply post-processing function over. if None will be inferred via --> [d for d in self.in_dims_pipe if d not in self.out_dims_model]
    group: postprocessing_kwargs

# belongs to train_kwargs
###################################



# these can be automatically inferred 
###################################
plugin_class:                                   # this will replace model_class
  default_value: null
  widget_type: str
  tooltip: optional - typically infered by model alias, unless multiple of same type used then name of model discoverable by model factory
  heading: Model
  flags: ["hidden"]
model_class:
  default_value: null
  widget_type: str
  tooltip: optional - typically infered by model alias, unless multiple of same type used then name of model discoverable by model factory
  heading: Model
  flags: ["hidden"]
name:
  default_value: null
  widget_type: str
  tooltip: "model object alias, optional. defaults to self."
  heading: Model
  flags: ["hidden"]
output_dirname:
  default_value: null
  widget_type: str
  tooltip: "Name of the output directory."
  heading: Model
  flags: ["hidden"]
output_dir:
  default_value: null
  widget_type: str
  tooltip: "Path to the output directory."
  heading: Model
  flags: ["hidden"]
