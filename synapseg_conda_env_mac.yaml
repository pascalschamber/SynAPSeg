name: synapseg
channels:
  - conda-forge
  - apple
  - defaults
dependencies:
  - python=3.10
  - pip
  - wheel
  - setuptools
  - cmake  # Needed for compiling some C++ extensions on Mac
  - h5py   
  - grpcio # Common failure point on Mac pip installs
  - gdal 
  - rasterio
  - llvmlite 
  - numba
  - numpy=1.26.4

  - pip:
      - "lxml>=5.0"         # added b/c solved install difficulties unique to M1 chips.. 
      - "numpy==1.26.4"     # essential requirement to get all libraries to cooperate
      
      # ---- TensorFlow (Mac Specific) ----
      # - tensorflow-metal  # Newer versions of TF obviate this package in the past tensorflow-metal added GPU acceleration for M1/M2/M3 chips but they seem to bundle this with tensorflow by default now?
      # Now, doesn't seem to be required, but could be different for some machines 
      - tensorflow
      
      # ---- PyTorch ----
      - torch
      - torchvision
      
      # ---- Model Libraries ---- 
      - stardist            # required, rest are optional
      - cellpose[gui]
      - segmentation-models
      - careamics

      # ---- Imaging / analysis stack ----
      - "napari[all]"
      - seaborn
      - ipykernel
      - tabulate
      - shapely
      - geojson
      - fsspec
      - opencv-python
      - PyQt6
      - patchify
      - imageio
      - aicsimageio
      - aicspylibczi
      - pylibCZIrw
      - scikit-learn
      - csbdeep
      - pingouin
      - bioformats_jar
      - glasbey